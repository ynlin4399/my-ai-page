<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LYN的留学后花园</title>
<style>
/* ============================================ */
/*  GLOBAL RESET & VARIABLES                     */
/* ============================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #d4a574;
  --gold-light: #f0d6b8;
  --bg-deep: #0a0a0f;
  --bg-card: rgba(20, 20, 40, 0.75);
  --text: #e0d8cc;
  --text-dim: #989890;
  --accent-sg: #e74c3c;
  --accent-hk: #e74c3c;
  --accent-uk: #1a3a5c;
  --glow-gold: 0 0 30px rgba(212, 165, 116, 0.3);
}
@font-face {
  font-family: 'Serif';
  src: local('Georgia'), local('Noto Serif SC'), local('SimSun'), local('serif');
}
body {
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  overflow-x: hidden;
  min-height: 100vh;
}

/* ============================================ */
/*  CANVAS PARTICLES (ENTRANCE)                  */
/* ============================================ */
#particleCanvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 0; pointer-events: none;
}

/* ============================================ */
/*  ENTRANCE PAGE                                */
/* ============================================ */
#entrancePage {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 100; background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 70%);
  transition: opacity 0.8s, transform 0.8s;
}
#entrancePage.hidden {
  opacity: 0; transform: scale(1.1); pointer-events: none;
}

.entrance-glow {
  position: absolute; width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(212,165,116,0.12) 0%, transparent 70%);
  border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%);
  animation: glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
  50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
}

.entrance-title {
  font-family: 'Georgia', 'Noto Serif SC', serif;
  font-size: clamp(2rem, 5vw, 3.5rem);
  color: var(--gold-light);
  text-shadow: 0 0 40px rgba(212,165,116,0.4), 0 0 80px rgba(212,165,116,0.2);
  z-index: 1; text-align: center; line-height: 1.6;
  animation: titleFadeIn 1.5s ease-out;
}
@keyframes titleFadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}
.entrance-subtitle {
  color: var(--text-dim); font-size: 1.1rem; margin-top: 1rem;
  z-index: 1; letter-spacing: 0.3em; animation: titleFadeIn 1.5s ease-out 0.3s both;
}

.btn-explore {
  margin-top: 3rem; z-index: 1;
  padding: 16px 50px; font-size: 1.25rem;
  background: linear-gradient(135deg, rgba(212,165,116,0.2), rgba(240,214,184,0.1));
  border: 1.5px solid var(--gold); color: var(--gold-light);
  border-radius: 50px; cursor: pointer; letter-spacing: 0.15em;
  backdrop-filter: blur(10px);
  transition: all 0.4s; position: relative; overflow: hidden;
  animation: titleFadeIn 1.5s ease-out 0.6s both;
}
.btn-explore:hover {
  background: linear-gradient(135deg, var(--gold), #b8860b);
  color: #fff; box-shadow: 0 0 40px rgba(212,165,116,0.5);
  transform: translateY(-3px);
}
.btn-explore::after {
  content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
  opacity: 0; transition: opacity 0.4s;
}
.btn-explore:hover::after { opacity: 1; }

/* floating petals */
.petal {
  position: absolute; z-index: 0; pointer-events: none;
  font-size: 1.5rem; opacity: 0.6;
  animation: petalFall linear infinite;
}
@keyframes petalFall {
  0%   { transform: translateY(-100px) rotate(0deg) translateX(0); opacity: 0; }
  10%  { opacity: 0.7; }
  90%  { opacity: 0.5; }
  100% { transform: translateY(110vh) rotate(720deg) translateX(150px); opacity: 0; }
}

/* ============================================ */
/*  MAIN APP CONTAINER                          */
/* ============================================ */
#mainApp {
  display: none; position: relative; z-index: 1; min-height: 100vh;
}
#mainApp.active { display: block; }

/* header */
.app-header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(10,10,15,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(212,165,116,0.15);
  padding: 12px 30px; display: flex; align-items: center; justify-content: space-between;
}
.app-header .logo {
  font-family: 'Georgia', 'Noto Serif SC', serif;
  font-size: 1.3rem; color: var(--gold-light);
}
.app-header .breadcrumb {
  display: flex; gap: 8px; align-items: center; font-size: 0.9rem;
  flex-wrap: wrap;
}
.app-header .breadcrumb span { color: var(--text-dim); }
.app-header .breadcrumb a {
  color: var(--gold); text-decoration: none; cursor: pointer; transition: color 0.3s;
}
.app-header .breadcrumb a:hover { color: var(--gold-light); }

/* ============================================ */
/*  LAYOUT                                       */
/* ============================================ */
.main-layout { display: flex; min-height: calc(100vh - 60px); }
.content-area {
  flex: 1; padding: 30px 40px; max-width: 1100px;
  animation: fadeSlideIn 0.5s ease-out;
}
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ============================================ */
/*  QUOTE SIDEBAR                               */
/* ============================================ */
.quote-sidebar {
  width: 280px; padding: 25px 20px;
  border-left: 1px solid rgba(212,165,116,0.1);
  display: flex; flex-direction: column; gap: 25px;
  position: sticky; top: 80px; height: fit-content;
}
.quote-card {
  background: var(--bg-card); border: 1px solid rgba(212,165,116,0.15);
  border-radius: 16px; padding: 22px 18px;
  backdrop-filter: blur(10px);
  transition: transform 0.3s, box-shadow 0.3s;
}
.quote-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--glow-gold);
}
.quote-card .quote-text {
  font-family: 'Georgia', 'Noto Serif SC', serif;
  font-size: 1.05rem; color: var(--gold-light); line-height: 1.8;
  margin-bottom: 8px;
}
.quote-card .quote-author {
  font-size: 0.8rem; color: var(--text-dim); text-align: right;
}
.quote-card .quote-motto {
  font-size: 0.95rem; color: #e8c580; text-align: center; margin-top: 8px;
  letter-spacing: 0.1em;
}

/* ============================================ */
/*  CARDS (Country / School / Program)           */
/* ============================================ */
.section-title {
  font-family: 'Georgia', 'Noto Serif SC', serif;
  font-size: 2rem; color: var(--gold-light); margin-bottom: 10px;
}
.section-desc {
  color: var(--text-dim); margin-bottom: 30px; font-size: 0.95rem;
}

.card-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 24px;
}

.card {
  background: var(--bg-card); border: 1px solid rgba(212,165,116,0.12);
  border-radius: 20px; padding: 28px 24px; cursor: pointer;
  backdrop-filter: blur(10px);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(135deg, rgba(212,165,116,0.05), transparent);
  opacity: 0; transition: opacity 0.4s;
}
.card:hover::before { opacity: 1; }
.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 30px rgba(212,165,116,0.15);
  border-color: rgba(212,165,116,0.3);
}
.card .card-icon { font-size: 2.5rem; margin-bottom: 12px; }
.card .card-name {
  font-size: 1.3rem; font-weight: 700; color: var(--gold-light); margin-bottom: 6px;
}
.card .card-eng {
  font-size: 0.8rem; color: var(--text-dim); margin-bottom: 10px;
}
.card .card-meta {
  font-size: 0.85rem; color: var(--text-dim); display: flex; gap: 15px; flex-wrap: wrap;
}
.card .card-badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 0.75rem; border: 1px solid var(--gold); color: var(--gold);
  margin-top: 10px;
}

/* country card (larger) */
.card.country-card { padding: 40px 30px; }
.card.country-card .card-icon { font-size: 3.5rem; }
.card.country-card .card-name { font-size: 1.6rem; }

/* ============================================ */
/*  PROGRAM DETAIL PAGE                          */
/* ============================================ */
.detail-header {
  margin-bottom: 30px;
}
.detail-header h2 {
  font-family: 'Georgia', 'Noto Serif SC', serif;
  font-size: 1.8rem; color: var(--gold-light);
}
.detail-header .eng-name {
  color: var(--text-dim); font-size: 0.9rem; margin-top: 4px;
}
.detail-header .uni-tag {
  display: inline-block; padding: 4px 14px; border-radius: 20px;
  font-size: 0.8rem; border: 1px solid var(--gold); color: var(--gold);
  margin-top: 10px;
}

.info-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px; margin-bottom: 30px;
}
.info-item {
  background: var(--bg-card); border: 1px solid rgba(212,165,116,0.1);
  border-radius: 14px; padding: 18px 16px;
  backdrop-filter: blur(10px);
}
.info-item .info-label {
  font-size: 0.78rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 6px;
}
.info-item .info-value {
  font-size: 1.05rem; color: var(--gold-light); font-weight: 600;
}

.section-block {
  background: var(--bg-card); border: 1px solid rgba(212,165,116,0.1);
  border-radius: 16px; padding: 24px; margin-bottom: 20px;
  backdrop-filter: blur(10px);
}
.section-block h3 {
  font-size: 1.1rem; color: var(--gold); margin-bottom: 14px;
  padding-bottom: 10px; border-bottom: 1px solid rgba(212,165,116,0.15);
}
.section-block ul {
  list-style: none; padding: 0;
}
.section-block ul li {
  padding: 7px 0; color: var(--text); font-size: 0.92rem;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  position: relative; padding-left: 18px;
}
.section-block ul li::before {
  content: '◆'; position: absolute; left: 0; top: 7px;
  font-size: 0.5rem; color: var(--gold);
}

.back-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 24px; background: transparent;
  border: 1px solid rgba(212,165,116,0.3); color: var(--gold);
  border-radius: 30px; cursor: pointer; font-size: 0.9rem;
  transition: all 0.3s; margin-top: 10px;
}
.back-btn:hover {
  background: rgba(212,165,116,0.1); border-color: var(--gold);
}

/* ============================================ */
/*  CERTIFICATION INFO                          */
/* ============================================ */
.cert-note {
  background: linear-gradient(135deg, rgba(212,165,116,0.08), rgba(240,214,184,0.03));
  border: 1px solid rgba(212,165,116,0.2); border-radius: 16px;
  padding: 20px 24px; margin-top: 20px;
}
.cert-note h3 { color: var(--gold); font-size: 1rem; }
.cert-note p { color: var(--text); font-size: 0.9rem; line-height: 1.7; margin-top: 8px; }

/* ============================================ */
/*  FLOATING MOTIVATION DOTS                     */
/* ============================================ */
.floating-quote {
  position: fixed; bottom: 30px; right: 30px; z-index: 60;
  background: var(--bg-card); border: 1px solid rgba(212,165,116,0.2);
  border-radius: 16px; padding: 14px 20px; max-width: 280px;
  backdrop-filter: blur(15px); font-size: 0.85rem;
  animation: floatUpDown 4s ease-in-out infinite;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.floating-quote .q { color: var(--gold-light); line-height: 1.6; }
.floating-quote .a { color: var(--text-dim); font-size: 0.75rem; text-align: right; margin-top: 6px; }
@keyframes floatUpDown {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* ============================================ */
/*  RESPONSIVE                                  */
/* ============================================ */
@media (max-width: 768px) {
  .main-layout { flex-direction: column; }
  .quote-sidebar { width: 100%; border-left: none; border-top: 1px solid rgba(212,165,116,0.1); position: static; flex-direction: row; flex-wrap: wrap; padding: 15px; }
  .quote-card { flex: 1; min-width: 200px; }
  .card-grid { grid-template-columns: 1fr; }
  .content-area { padding: 20px 15px; }
  .floating-quote { max-width: 220px; bottom: 15px; right: 10px; padding: 10px 14px; font-size: 0.78rem; }
}

/* ============================================ */
/*  SCROLLBAR                                   */
/* ============================================ */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(212,165,116,0.2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(212,165,116,0.4); }

/* ============================================ */
/*  CERTIFICATION BADGE                         */
/* ============================================ */
.cert-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(46, 204, 113, 0.1); border: 1px solid rgba(46, 204, 113, 0.3);
  color: #2ecc71; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem;
}
.cert-badge::before { content: '✓'; font-weight: bold; }
</style>
</head>

// ============================================
//  PARTICLES
// ============================================
function initParticles() {
  const c = document.getElementById('particleCanvas');
  const ctx = c.getContext('2d');
  let w, h, particles = [];
  function resize() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);

  for (let i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * w, y: Math.random() * h,
      size: Math.random() * 2 + 0.5,
      speedX: (Math.random() - 0.5) * 0.4,
      speedY: (Math.random() - 0.5) * 0.4,
      opacity: Math.random() * 0.5 + 0.1,
      pulse: Math.random() * Math.PI * 2
    });
  }

  function animate() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => {
      p.x += p.speedX; p.y += p.speedY;
      if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
      p.pulse += 0.01;
      const alpha = p.opacity + Math.sin(p.pulse) * 0.15;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(212,165,116,${Math.max(0.05, alpha)})`;
      ctx.fill();
    });
    // connect nearby
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(212,165,116,${0.06 * (1 - dist/120)})`;
          ctx.stroke();
        }
      }
    }
    particleAnimId = requestAnimationFrame(animate);
  }
  animate();
}

    petal.style.animationDelay = Math.random() * 8 + 's';
    petal.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
    container.appendChild(petal);
  }
}

// ============================================
//  ENTRANCE → MAIN
// ============================================
function enterGarden() {
  document.getElementById('entrancePage').classList.add('hidden');
  document.getElementById('mainApp').classList.add('active');
  showCountries();
  // rotate floating quote
  updateFloatingQuote();
}

// ============================================
//  NAVIGATION HELPERS
// ============================================
function updateBreadcrumb(parts) {
  let html = '<a onclick="showCountries()">🏠 国家</a>';
  parts.forEach((p, i) => {
    html += ' <span>›</span> ';
    if (p.onclick) {
      html += `<a onclick="${p.onclick}">${p.label}</a>`;
    } else {
      html += `<span style="color:var(--gold-light)">${p.label}</span>`;
    }
  });
  document.getElementById('breadcrumb').innerHTML = html;
}

function updateQuotes() {
  const sidebar = document.getElementById('quoteSidebar');
  const q1 = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  const q2 = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  const motto1 = MOTTOS[Math.floor(Math.random() * MOTTOS.length)];
  const motto2 = MOTTOS[Math.floor(Math.random() * MOTTOS.length)];

  sidebar.innerHTML = `
    <div class="quote-card">
      <div class="quote-motto">${motto1}</div>
    </div>
    <div class="quote-card">
      <div class="quote-text">${q1.text}</div>
      <div class="quote-author">${q1.author}</div>
    </div>
    <div class="quote-card">
      <div class="quote-motto">${motto2}</div>
    </div>
    <div class="quote-card">
      <div class="quote-text">${q2.text}</div>
      <div class="quote-author">${q2.author}</div>
    </div>
  `;
}

function updateFloatingQuote() {
  const el = document.getElementById('floatingQuote');
  const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  const m = MOTTOS[Math.floor(Math.random() * MOTTOS.length)];
  el.innerHTML = `<div class="q">${m}</div><div class="a">${q.author ? q.author : ''}</div>`;
}

// ============================================
//  VIEW: COUNTRIES
// ============================================
function showCountries() {
  currentView = 'countries';
  currentCountry = null; currentSchool = null; currentProgram = null;
  updateBreadcrumb([]);
  updateQuotes();

  const area = document.getElementById('contentArea');
  area.innerHTML = `
    <h2 class="section-title">🌍 选择留学目的地</h2>
    <p class="section-desc">点击国家卡片，探索属于你的梦想院校</p>
    <div class="card-grid">
      ${Object.values(DATA).map(c => `
        <div class="card country-card" onclick="showSchools('${c.id}')">
          <div class="card-icon">${c.flag}</div>
          <div class="card-name">${c.name}</div>
          <div class="card-eng">${Object.keys(c.schools).length} 所目标院校</div>
          <div class="card-meta" style="margin-top:8px;">
            ${Object.values(c.schools).map(s => `<span class="card-badge">${s.name}</span>`).join(' ')}
          </div>
        </div>
      `).join('')}
    </div>
  `;
  area.style.animation = 'none'; area.offsetHeight; area.style.animation = 'fadeSlideIn 0.5s ease-out';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================
//  VIEW: SCHOOLS
// ============================================
function showSchools(countryId) {
  currentView = 'schools';
  currentCountry = countryId;
  currentSchool = null; currentProgram = null;
  const country = DATA[countryId];
  updateBreadcrumb([{ label: `${country.flag} ${country.name}` }]);
  updateQuotes();

  const area = document.getElementById('contentArea');
  area.innerHTML = `
    <h2 class="section-title">${country.flag} ${country.name}</h2>
    <p class="section-desc">选择目标院校查看专业</p>
    <div class="card-grid">
      ${Object.values(country.schools).map(s => `
        <div class="card" onclick="showPrograms('${countryId}', '${s.id}')">
          <div class="card-icon">${s.logo}</div>
          <div class="card-name">${s.name}</div>
          <div class="card-eng">${s.eng}</div>
          <div class="card-meta">📊 ${s.rank}</div>
          <span class="card-badge">${Object.keys(s.programs).length} 个目标专业</span>
        </div>
      `).join('')}
    </div>
    <button class="back-btn" onclick="showCountries()">← 返回国家列表</button>
  `;
  area.style.animation = 'none'; area.offsetHeight; area.style.animation = 'fadeSlideIn 0.5s ease-out';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================
//  VIEW: PROGRAMS
// ============================================
function showPrograms(countryId, schoolId) {
  currentView = 'programs';
  currentCountry = countryId;
  currentSchool = schoolId;
  currentProgram = null;
  const country = DATA[countryId];
  const school = country.schools[schoolId];
  updateBreadcrumb([
    { label: `${country.flag} ${country.name}`, onclick: `showSchools('${countryId}')` },
    { label: school.name }
  ]);
  updateQuotes();

  const area = document.getElementById('contentArea');
  area.innerHTML = `
    <h2 class="section-title">${school.logo} ${school.name}</h2>
    <p class="section-desc">${school.eng} | ${school.rank}</p>
    <div class="card-grid">
      ${Object.values(school.programs).map(p => `
        <div class="card" onclick="showDetail('${countryId}', '${schoolId}', '${p.id}')">
          <div class="card-name">${p.name}</div>
          <div class="card-eng">${p.eng}</div>
          <div class="card-meta" style="margin-top:10px;">
            <span>⏱ ${p.duration}</span>
            <span>📝 雅思 ${p.ielts.match(/[\d.]+/)?.[0] || '—'}</span>
          </div>
          <span class="card-badge">${p.degree}</span>
        </div>
      `).join('')}
    </div>
    <button class="back-btn" onclick="showSchools('${countryId}')">← 返回 ${country.name}</button>
  `;
  area.style.animation = 'none'; area.offsetHeight; area.style.animation = 'fadeSlideIn 0.5s ease-out';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================
//  VIEW: PROGRAM DETAIL
// ============================================
function showDetail(countryId, schoolId, programId) {
  currentView = 'detail';
  currentCountry = countryId;
  currentSchool = schoolId;
  currentProgram = programId;
  const country = DATA[countryId];
  const school = country.schools[schoolId];
  const prog = school.programs[programId];
  updateBreadcrumb([
    { label: `${country.flag} ${country.name}`, onclick: `showSchools('${countryId}')` },
    { label: school.name, onclick: `showPrograms('${countryId}', '${schoolId}')` },
    { label: prog.name }
  ]);
  updateQuotes();
  updateFloatingQuote();

  const area = document.getElementById('contentArea');

  const tracksHTML = prog.tracks.length > 0 ? `
    <div class="section-block">
      <h3>📂 专业方向</h3>
      <ul>${prog.tracks.map(t => `<li>${t}</li>`).join('')}</ul>
    </div>
  ` : '';

  const coursesHTML = prog.courses.length > 0 ? `
    <div class="section-block">
      <h3>📚 主要课程</h3>
      <ul>${prog.courses.map(c => `<li>${c}</li>`).join('')}</ul>
    </div>
  ` : '';

  const materialsHTML = `
    <div class="section-block">
      <h3>📋 申请材料清单</h3>
      <ul>${prog.materials.map(m => `<li>${m}</li>`).join('')}</ul>
    </div>
  `;

  area.innerHTML = `
    <div class="detail-header">
      <h2>${prog.name}</h2>
      <div class="eng-name">${prog.eng}</div>
      <span class="uni-tag">${school.name}</span>
      <span class="uni-tag">${prog.degree}</span>
    </div>

    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">⏱ 学制</div>
        <div class="info-value">${prog.duration}</div>
      </div>
      <div class="info-item">
        <div class="info-label">📅 入学时间</div>
        <div class="info-value">${prog.intake}</div>
      </div>
      <div class="info-item">
        <div class="info-label">⏰ 申请截止</div>
        <div class="info-value">${prog.deadline}</div>
      </div>
      <div class="info-item">
        <div class="info-label">📝 雅思要求</div>
        <div class="info-value">${prog.ielts}</div>
      </div>
      <div class="info-item">
        <div class="info-label">🔤 托福要求</div>
        <div class="info-value">${prog.toefl}</div>
      </div>
      <div class="info-item">
        <div class="info-label">📊 均分建议</div>
        <div class="info-value">${prog.gpa}</div>
      </div>
      <div class="info-item">
        <div class="info-label">💰 学费</div>
        <div class="info-value">${prog.tuition}</div>
      </div>
      <div class="info-item">
        <div class="info-label">🎓 学历背景</div>
        <div class="info-value" style="font-size:0.9rem;">${prog.bg}</div>
      </div>
    </div>

    ${tracksHTML}
    ${coursesHTML}
    ${materialsHTML}

    <div class="section-block">
      <h3>⭐ 项目亮点</h3>
      <p style="color:var(--text);line-height:1.7;">${prog.highlights}</p>
    </div>

    <div class="cert-note">
      <h3>🏅 留服认证说明</h3>
      <p>${prog.certNote}</p>
      <p style="margin-top:10px;color:var(--text-dim);font-size:0.85rem;">
        💡 <strong>什么是留服认证？</strong>留服认证是中国教育部留学服务中心对国（境）外学历学位的官方认证，是回国后考公、进国企、落户、升学的必备文件。认证费360元/份，一般10-20个工作日出结果，需本人通过zwfw.cscse.edu.cn在线申请。
      </p>
    </div>

    <button class="back-btn" onclick="showPrograms('${countryId}', '${schoolId}')">← 返回 ${school.name}</button>
  `;

  area.style.animation = 'none'; area.offsetHeight; area.style.animation = 'fadeSlideIn 0.5s ease-out';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================
//  INIT
// ============================================
function init() {
  initParticles();
  createPetals();
  updateFloatingQuote();
  // rotate floating quote every 12s
  setInterval(updateFloatingQuote, 12000);
}

window.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
